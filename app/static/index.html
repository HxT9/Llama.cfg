<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llamacfg — llama.cpp config manager</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">llama<span>cfg</span></div>
    <nav class="tabs">
      <button class="tab active" data-tab="models">Models</button>
      <button class="tab" data-tab="configs">Configs</button>
      <button class="tab" data-tab="preview">INI Preview</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
    <div id="hw-badge" class="hw-badge" title="detected hardware">…</div>
  </header>

  <main>
    <!-- MODELS -->
    <section id="tab-models" class="panel active">
      <div class="toolbar">
        <button id="btn-rescan" class="btn primary">Rescan models</button>
        <input id="model-filter" class="filter" placeholder="filter by name / arch…" />
        <span id="models-warn" class="warn"></span>
      </div>
      <div class="table-wrap">
        <table id="models-table">
          <thead>
            <tr><th>Name</th><th>Arch</th><th>Layers</th><th>Train ctx</th>
                <th>Size</th><th>MoE</th><th>mmproj</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- CONFIGS -->
    <section id="tab-configs" class="panel">
      <div class="split">
        <aside class="sidebar">
          <div class="toolbar">
            <button id="btn-new-config" class="btn">+ New config</button>
          </div>
          <div id="config-list" class="config-list"></div>
        </aside>
        <div id="config-editor" class="editor">
          <div class="empty-hint">Select a config, or create one from the Models tab.</div>
        </div>
      </div>
    </section>

    <!-- PREVIEW -->
    <section id="tab-preview" class="panel">
      <div class="toolbar">
        <button id="btn-refresh-preview" class="btn">Refresh</button>
        <button id="btn-export" class="btn primary">Export to file</button>
        <button id="btn-import" class="btn">Import from file</button>
        <span id="preview-msg" class="warn"></span>
      </div>
      <pre id="ini-preview" class="ini-preview"></pre>
    </section>

    <!-- SETTINGS -->
    <section id="tab-settings" class="panel">
      <div id="settings-form" class="settings-form"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
